home_assistant:
  url: "http://192.168.x.x:8123"
  token: "your_long_lived_access_token"
  sensors:
    battery_pct: "sensor.powerwall_battery"
    solar_power: "sensor.powerwall_solar_power"
    load_power: "sensor.powerwall_load_power"
    grid_power: "sensor.powerwall_grid_power"
    grid_status: "binary_sensor.powerwall_grid_status"

## Weather provider: "homeassistant" (recommended) or "pirateweather" (external API)
weather:
  provider: "homeassistant"
  entity_id: "weather.home"
  ## --- Pirate Weather (uncomment below and change provider to "pirateweather") ---
  # provider: "pirateweather"
  # api_key: "your_pirate_weather_api_key"
  # latitude: 28.5383
  # longitude: -81.3792

tidbyt:
  device_id: "your_tidbyt_device_id"
  api_token: "your_tidbyt_api_token"
  installation_id: "powerwall"

## Seasonal easter eggs: set override to force a holiday theme for testing
## Options: "christmas", "july4", "halloween", "thanksgiving"
## Leave blank or omit for automatic date-based detection
seasonal:
  override: ""

## Update mode: "websocket" (real-time via HA WebSocket) or "polling" (REST every N seconds)
schedule:
  mode: "websocket"
  interval_seconds: 15    # only used in polling mode
